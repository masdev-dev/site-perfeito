<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Orion Group</title>
    <style>
        body { font-family: monospace; background: #1e2a2e; color: #fdf6e3; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: #2c3e2e; }
        th, td { border: 1px solid #c49a6c; padding: 8px; text-align: left; }
        th { background: #c49a6c; color: #1e2a2e; }
        input, button { padding: 8px; margin: 10px 0; }
        .login { margin-bottom: 20px; }
        .erro { color: #ffaaaa; }
    </style>
</head>
<body>
    <h1>Painel de Leads - Orion Group</h1>
    <div id="login">
        <label>Senha: <input type="password" id="senha"></label>
        <button id="btn-login">Acessar</button>
    </div>
    <div id="conteudo" style="display:none;">
        <h2>Leads Recebidos</h2>
        <div id="tabela"></div>
    </div>
    <div id="erro" class="erro"></div>

    <script>
        const apiUrl = 'https://api-nova-0zum.onrender.com/admin/leads';
        document.getElementById('btn-login').addEventListener('click', async () => {
            const senha = document.getElementById('senha').value;
            const erroDiv = document.getElementById('erro');
            erroDiv.innerHTML = '';
            try {
                const response = await fetch(`${apiUrl}?senha=${encodeURIComponent(senha)}`);
                if (!response.ok) {
                    if (response.status === 401) throw new Error('Senha incorreta');
                    throw new Error('Erro ao buscar dados');
                }
                const leads = await response.json();
                document.getElementById('login').style.display = 'none';
                document.getElementById('conteudo').style.display = 'block';
                const tabela = document.getElementById('tabela');
                if (leads.length === 0) {
                    tabela.innerHTML = '<p>Nenhum lead cadastrado ainda.</p>';
                    return;
                }
                let html = '<table><th>ID</th><th>Nome</th><th>Email</th><th>Mensagem</th><th>Status</th><th>Data</th></tr>';
                leads.forEach(lead => {
                    html += `<tr>
                        <td>${lead.id}</td>
                        <td>${escapeHtml(lead.nome)}</td><td>${escapeHtml(lead.email)}</td><td>${escapeHtml(lead.mensagem)}</td><td>${lead.status}</td><td>${new Date(lead.criado_em).toLocaleString()}</td>
                    </tr>`;
                });
                html += '</table>';
                tabela.innerHTML = html;
            } catch (err) {
                erroDiv.innerHTML = err.message;
            }
        });
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
